# ============================================================
# IRFEYAL - Módulo de Asistencia - Configuración
# ============================================================

# Configuración de base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/irfeyal_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:your_password}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080
server.servlet.context-path=/api/v1

# JWT - Usar variable de entorno JWT_SECRET en producción
jwt.secret=${JWT_SECRET:IRFEYAL_SECRET_KEY_2024_CHANGE_IN_PRODUCTION_256_BITS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# SpringDoc OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
